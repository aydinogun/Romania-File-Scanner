name: Fetch ANC data
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-ron
      - run: pip install -r requirements.txt
      - run: python fetch_data.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Update ANC data" || echo "No changes"
          git push
